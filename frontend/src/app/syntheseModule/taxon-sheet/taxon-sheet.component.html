<layout>
  <div class="TaxonSheet">
    <infos
      class="TaxonSheet__infos"
      [taxon]="taxon"
      [mediaUrl]="mediaUrl"
    />
    <indicators
      class="TaxonSheet__indicators"
      [profile]="profile"
    />
    <pnx-map height="50vh">
      <pnx-geojson
        [geojson]="profilArea"
        [zoomOnFirstTime]="true"
      ></pnx-geojson>
    </pnx-map>
  </div>
</layout>
