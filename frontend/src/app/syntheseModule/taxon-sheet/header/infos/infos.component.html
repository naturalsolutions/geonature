<div class="Infos">
  <div class="Infos__image">
  </div>
  <div class="Infos__infos">
    <div class="Infos__infosTaxonomy">
      / exemple / de / taxonomy / {{ taxon?.nom_complet }}
    </div>
    <div class="Infos__infosVernacularName" *ngIf="taxon?.nom_vern">
      {{ taxon?.nom_vern }}
    </div>
  </div>
</div>
<small class="text-muted">
  *Le profil est calculé à partir des observations considérées comme valides
</small>
<div
  class="card"
  *ngIf="mediaUrl"
>
  <div
    class="card-body cover image"
    [style.background-image]="'url(' + mediaUrl + ')'"
  ></div>
</div>
